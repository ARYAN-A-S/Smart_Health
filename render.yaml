services:
  - type: web
    name: smart-health-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: backend
      - key: DATABASE_URL
        value: sqlite:///backend/smart_health.db
      - key: JWT_SECRET
        value: supersecretjwtkeyforlocaldevelopmentonly12345
